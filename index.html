<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CODE PRODUCT — รายการสินค้า</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="icon" href="data:,">
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#101828;--muted:#6b7280;--bd:#e6eaf2;--pri:#2f6bff;--r:18px;--sh:0 8px 24px rgba(16,24,40,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',system-ui;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;z-index:50;background:rgba(246,247,251,.88);backdrop-filter:blur(12px) saturate(180%);border-bottom:4px solid #ffdbe0}
.header-inner{max-width:1200px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#2f6bff,#7aa2ff);display:grid;place-items:center;color:#fff;font-weight:700;flex-shrink:0}
.wrap{max-width:1200px;margin:0 auto;padding:20px 18px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px}
.hd{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom:1px solid var(--bd);font-weight:700;gap:10px;flex-wrap:wrap}
.bd{padding:18px}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:.88rem;color:#444;font-weight:600}
.input,.select{appearance:none;width:100%;padding:10px 13px;border:1px solid var(--bd);border-radius:12px;font-family:'Sarabun',system-ui;font-size:.95rem;background:#fff}
.input:focus,.select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(47,107,255,.1)}
.seg{display:inline-flex;border:1px solid var(--bd);border-radius:999px;overflow:hidden}
.seg button{padding:8px 14px;border:none;background:#fff;cursor:pointer;font-family:'Sarabun',system-ui;font-size:.88rem;font-weight:600;white-space:nowrap}
.seg button.active{background:var(--pri);color:#fff}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 15px;border-radius:13px;border:1px solid var(--bd);background:#fff;cursor:pointer;font-weight:600;font-family:'Sarabun',system-ui;font-size:.9rem;white-space:nowrap}
.btn.primary{background:#d6e8b5;border-color:#c3d99e;color:#3f4d25}
.btn.info{background:#eef2ff;border-color:#c7d2fe;color:#3730a3}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.toolbar .field{flex:1;min-width:160px}
.toolbar .search{flex:2;min-width:200px}

/* Checkbox Styles */
.chk-box{width:18px;height:18px;cursor:pointer;accent-color:var(--pri)}

/* Table Styles */
table{width:100%;border-collapse:collapse;font-size:.92rem}
thead th{background:#f4f6fb;padding:11px 13px;text-align:center;font-weight:700;border-bottom:2px solid var(--bd);white-space:nowrap}
tbody td{padding:11px 13px;border-bottom:1px solid #f0f2f6;text-align:center;vertical-align:middle}
tbody tr:hover{background:#fafcff}
tbody tr.selected{background:#eef2ff}
.thumb{width:48px;height:48px;border-radius:10px;overflow:hidden;background:#f2f5fb;border:1px solid var(--bd);display:grid;place-items:center;margin:0 auto}
.thumb img{width:100%;height:100%;object-fit:contain}
.thumb-empty{font-size:.7rem;color:#bbb}
.iconbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--bd);background:#fff;cursor:pointer;display:inline-grid;place-items:center;font-size:.9rem}
.actions{display:flex;gap:6px;justify-content:center}
.hidden{display:none!important}

/* Card Grid */
#cardGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:640px){#cardGrid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){#cardGrid{grid-template-columns:repeat(4,1fr)}}
.product-card{position:relative;background:#fff;border:1px solid var(--bd);border-radius:15px;box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;transition:border .2s}
.product-card.selected{border:2px solid var(--pri);box-shadow:0 0 0 3px rgba(47,107,255,.1)}
.card-chk-wrap{position:absolute;top:10px;left:10px;background:#fff;border-radius:6px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:grid;place-items:center;z-index:10}
.card-img{width:100%;aspect-ratio:1/1;object-fit:contain;background:#f2f5fb;display:block}
.card-img-empty{width:100%;aspect-ratio:1/1;background:#f2f5fb;display:grid;place-items:center;color:#bbb;font-size:.8rem}
.card-body{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:3px}
.card-name{font-weight:700;font-size:.92rem;line-height:1.3}
.card-size{font-size:.8rem;color:var(--muted)}
.card-company{font-size:.78rem;color:var(--pri);background:#eef2ff;border-radius:999px;padding:2px 8px;width:fit-content;margin-top:3px}
.card-footer{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--bd);background:#fafcff}
.card-footer .iconbtn{flex:1}

/* View toggle */
.view-toggle{display:flex;gap:5px}
.view-toggle button{width:34px;height:34px;border-radius:9px;border:1px solid var(--bd);background:#fff;cursor:pointer;display:grid;place-items:center;font-size:1rem}
.view-toggle button.active{background:var(--pri);color:#fff;border-color:var(--pri)}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#101828;color:#fff;padding:11px 22px;border-radius:999px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}
#toast.show{opacity:1}

/* Loading */
#overlay{position:fixed;inset:0;background:rgba(255,255,255,.72);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:999}
.spinner{width:44px;height:44px;border:5px solid #e0e7ff;border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-msg{margin-top:12px;font-weight:600;color:var(--pri);font-size:.95rem}

/* Preview Modal */
#previewModal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:2000;display:grid;place-items:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
#previewModal.open{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:20px;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.3);transform:translateY(20px);transition:transform .25s}
#previewModal.open .modal-box{transform:translateY(0)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bd);font-weight:700;flex-shrink:0}
.modal-close-btn{width:32px;height:32px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:1.1rem;display:grid;place-items:center}
.modal-scroll{overflow-y:auto;flex:1}
.modal-photo{width:100%;max-height:260px;object-fit:contain;background:#f2f5fb;display:block}
.modal-photo-empty{width:100%;height:160px;background:#f2f5fb;display:grid;place-items:center;color:#bbb;font-size:.95rem}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.modal-info{display:grid;gap:8px}
.modal-row{display:flex;gap:8px;font-size:.93rem;align-items:flex-start}
.modal-label{color:var(--muted);min-width:82px;flex-shrink:0;padding-top:1px}
.modal-value{font-weight:600}
.modal-section-title{font-size:.83rem;color:var(--muted);margin-bottom:5px;font-weight:600}
.parts-table{width:100%;border-collapse:collapse;font-size:.88rem}
.parts-table th{background:#f4f6fb;padding:7px 10px;text-align:left;font-weight:700;border:1px solid var(--bd)}
.parts-table td{padding:7px 10px;border:1px solid #f0f2f6}
.parts-table tr:nth-child(even) td{background:#fafcff}
.modal-ft{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}

/* Print */
@page{size:A4 portrait;margin:0}
@media print{
  header,#filterCard,#listControlBar,#overlay,#toast,#previewModal,#bulkPrintBar{display:none!important}
  body{background:#fff}
  .print-page{width:210mm;padding:16mm;margin:0 auto;break-after:page}
  .print-page:last-child{break-after:auto}
  .print-h1{font-weight:700;font-size:18pt;margin-bottom:4mm}
  .print-meta{margin:2mm 0}
  .print-titlebar{border:1px solid #ddd;border-radius:2mm;padding:4mm;margin:4mm 0 2mm;background:#fafafa}
  .print-hero{border:1px solid #ddd;display:grid;place-items:center;margin:2mm 0 4mm;background:#fff;width:300px;height:300px;margin-left:auto;margin-right:auto}
  .print-hero img{width:300px;height:300px;object-fit:contain}
  .print-table{width:100%;border-collapse:collapse;font-size:11pt;margin-top:4mm}
  .print-table th,.print-table td{border:1px solid #444;padding:6px}
  .print-footer{display:flex;justify-content:space-between;margin-top:6mm;font-size:10pt;color:#444}
  .print-footer img{height:14mm}
}

/* Bulk Print Bar */
#bulkPrintBar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #fff; padding: 12px 24px; border-radius: 999px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2); border: 2px solid var(--pri);
    display: flex; gap: 16px; align-items: center; z-index: 100;
    transition: opacity 0.3s, transform 0.3s;
}
#bulkPrintBar.hidden { opacity: 0; transform: translate(-50%, 20px); pointer-events: none; display: flex !important; }
</style>
</head>
<body>

<div id="overlay">
  <div style="text-align:center">
    <div class="spinner"></div>
    <div class="spin-msg" id="spinMsg">กำลังโหลด…</div>
  </div>
</div>

<div id="toast"></div>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo">CP</div>
      <div>
        <div style="font-size:1.1rem;font-weight:700">CODE PRODUCT</div>
        <div style="font-size:.8rem;color:var(--muted)">ระบบจัดการส่วนประกอบสินค้า</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="view-toggle">
        <button id="btnTable" class="active" title="ตาราง">☰</button>
        <button id="btnCard" title="การ์ด">⊞</button>
      </div>
      <button class="btn" onclick="loadAll()" id="reloadBtn">🔄 โหลดใหม่</button>
    </div>
  </div>
</header>

<main class="wrap">

  <div class="card" id="filterCard">
    <div class="bd" style="padding-bottom: 8px;">
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap">
        <div class="field search" style="flex:1; min-width:200px;">
          <input id="fSearch" class="input" placeholder="🔍 ค้นหาชื่อสินค้า หรือ บาร์โค้ด..." oninput="render()"/>
        </div>
        <button class="btn" id="toggleFilterBtn" onclick="toggleFilters()" style="background:#f2f5fb; border-color:#d0d8ef;">
          ⚙️ ตัวกรองเพิ่มเติม
        </button>
      </div>

      <div id="extendedFilters" class="hidden" style="margin-top:16px; padding-top:16px; border-top:1px dashed var(--bd);">
        <div class="toolbar">
          <div class="field">
            <label>รูปแบบรายการ</label>
            <div class="seg">
              <button id="fSingle" class="active" onclick="setMode('single',this)">รายการเดี่ยว</button>
              <button id="fSet" onclick="setMode('set',this)">รายการชุด</button>
            </div>
          </div>
          <div class="field"><label>ผลิตภัณฑ์ของ</label><select id="fCompany" class="select" onchange="render()"></select></div>
          <div class="field"><label>หมวดหมู่สาร</label><select id="fCategory" class="select" onchange="render()"></select></div>
          <div class="field"><label>บรรจุภัณฑ์</label><select id="fPackage" class="select" onchange="render()"></select></div>
          <div class="field"><label>ฟิล์ม</label><select id="fFilm" class="select" onchange="render()"></select></div>
          <div class="field"><label>ฝา</label><select id="fCap" class="select" onchange="render()"></select></div>
          <div class="field"><label>ลังนอก</label><select id="fBox" class="select" onchange="render()"></select></div>
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
    <span id="listCount" style="font-size:.9rem; font-weight:600; color:var(--muted)"></span>
  </div>

  <div class="card" id="tableView">
    <div class="bd" style="padding:0">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><input type="checkbox" class="chk-box" id="chkAllTable" onchange="toggleAllPage(this.checked)"></th>
              <th style="width:60px">รูป</th>
              <th>ชื่อสินค้า</th>
              <th style="width:140px">ขนาด</th>
              <th style="width:200px">ผลิตภัณฑ์ของ</th>
              <th style="width:130px">การทำงาน</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="tableEmpty" class="hidden" style="text-align:center;padding:40px;color:var(--muted)">
        <div style="font-size:2.5rem">📦</div>ไม่พบรายการสินค้าที่ตรงกับเงื่อนไข
      </div>
    </div>
  </div>

  <div id="cardView" class="hidden">
    <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" class="chk-box" id="chkAllCard" onchange="toggleAllPage(this.checked)">
      <label for="chkAllCard" style="font-size: .9rem; font-weight: 600;">เลือกทั้งหมดในหน้านี้</label>
    </div>
    <div id="cardGrid"></div>
    <div id="cardEmpty" class="hidden" style="text-align:center;padding:40px;color:var(--muted)">
      <div style="font-size:2.5rem">📦</div>ไม่พบรายการสินค้าที่ตรงกับเงื่อนไข
    </div>
  </div>

  <div id="listControlBar" style="display:flex;justify-content:flex-end;margin-top:10px">
    <div class="seg">
      <button id="prevPage">‹</button>
      <button id="pageNum" class="active">1</button>
      <button id="nextPage">›</button>
    </div>
  </div>

</main>

<div id="bulkPrintBar" class="hidden">
  <span style="font-weight: 600; color: #101828;">เลือกแล้ว <span id="selCount" style="color:var(--pri)">0</span> รายการ</span>
  <button class="btn" onclick="clearSelection()">ยกเลิก</button>
  <button class="btn primary" onclick="printSelectedItems()">🖨️ พิมพ์รายการที่เลือก</button>
</div>

<div id="previewModal">
  <div class="modal-box">
    <div class="modal-hd">
      <span id="modalTitle">พรีวิวสินค้า</span>
      <button class="modal-close-btn" id="modalClose">✕</button>
    </div>
    <div class="modal-scroll">
      <div id="modalPhotoWrap"></div>
      <div class="modal-body">
        <div class="modal-info">
          <div class="modal-row"><span class="modal-label">ชื่อสินค้า</span><span class="modal-value" id="mName"></span></div>
          <div class="modal-row"><span class="modal-label">ขนาด</span><span class="modal-value" id="mSize"></span></div>
          <div class="modal-row"><span class="modal-label">บริษัท</span><span class="modal-value" id="mCompany"></span></div>
          <div class="modal-row"><span class="modal-label">หมวดหมู่</span><span class="modal-value" id="mCategory"></span></div>
        </div>
        <div id="mPartsWrap"></div>
        <div>
          <div class="modal-section-title">บาร์โค้ด</div>
          <canvas id="mBarcodeCanvas" height="54" style="width:100%;border-radius:10px;border:1px dashed #d0d8ef;background:#fff;display:block"></canvas>
          <div id="mBarcodeNum" style="text-align:center;font-size:.83rem;color:var(--muted);margin-top:4px"></div>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn" id="modalClose2">ปิด</button>
      <button class="btn info" id="modalPrintBtn">🖨️ พิมพ์รายการนี้</button>
    </div>
  </div>
</div>

<template id="printTpl">
  <div class="print-page">
    <div class="print-h1">CODE PRODUCT</div>
    <div class="print-meta">ผลิตภัณฑ์ของ: <span data-f="company"></span> — หมวดหมู่สาร: <span data-f="category"></span></div>
    <div class="print-titlebar">
      <div><b>ชื่อสินค้า:</b> <span data-f="name"></span></div>
      <div><b>ขนาด:</b> <span data-f="size"></span></div>
    </div>
    <div class="print-hero"><img data-f="photo" style="max-width:100%;max-height:100%"/></div>
    <table class="print-table" data-f="table"></table>
    <div class="print-footer">
      <span>พิมพ์เมื่อ: <span data-f="printed"></span></span>
      <span><img data-f="barcode"/></span>
    </div>
  </div>
</template>

<script>
// ══════════════════════════════════════════════
//  ⚙️  ตั้งค่า URL ที่นี่
// ══════════════════════════════════════════════
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbzQyoXACIeuH6MweFFxGxkoIejaixq-_4_D1QXvfqSmSpy3nbNktFrFfVGxcTQIbqcC/exec';
const PAGE_SIZE = 50;

// ══════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════
let allItems  = [];
let filterMod = 'single';
let viewMode  = 'table';
let page      = 1;
let selectedIds = new Set(); // เก็บ ID ที่ผู้ใช้ติ๊กเลือก

// ══════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════
let toastTimer;
function toast(msg, ms=2800){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),ms);
}
function showLoading(msg='กำลังโหลด…'){
  document.getElementById('spinMsg').textContent=msg;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideLoading(){ document.getElementById('overlay').classList.add('hidden'); }

// ── แปลงลิงก์รูปให้แสดงผลได้ ──
function getSafeImageUrl(url) {
  if (!url) return '';
  var match = url.match(/id=([a-zA-Z0-9_-]+)/);
  if (match && url.indexOf('drive.google.com/uc') !== -1) {
    return 'https://lh3.googleusercontent.com/d/' + match[1];
  }
  return url;
}

async function gasCall(action, data={}){
  const res = await fetch(GAS_URL, {
    method:'POST', redirect:'follow',
    body: JSON.stringify({action,...data})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}

// ══════════════════════════════════════════════
//  Code128 Barcode
// ══════════════════════════════════════════════
const C128=["11011001100","11001101100","11001100110","10010011000","10010001100","10001001100","10011001000","10011000100","10001100100","11001001000","11001000100","11000100100","10110011100","10011011100","10011001110","10111001100","10011101100","10011100110","11001110010","11001011100","11001001110","11011100100","11001110100","11101101110","11101001100","11100101100","11100100110","11101100100","11100110100","11100110010","11011011000","11011000110","11000110110","10100011000","10001011000","10001000110","10110001000","10001101000","10001100010","11010001000","11000101000","11000100010","10110111000","10110001110","10001101110","10111011000","10111000110","10001110110","11101110110","11010001110","11000101110","11011101000","11011100010","11011101110","11101011000","11101000110","11100010110","11101101000","11101100010","11100011010","11101111010","11001000010","11110001010","10100110000","10100001100","10010110000","10010000110","10000101100","10000100110","10110010000","10110000100","10011010000","10011000010","10000110100","10000110010","11000010010","11001010000","11110111010","11000010100","10001111010","10100111100","10010111100","10010011110","10111100100","10011110100","10011110010","11110100100","11110010100","11110010010","11011011110","11011110110","11110110110","10101111000","10100011110","10001011110","10111101000","10111100010","11110101000","11110100010","10111011110","10111101110","11101011110","11110101110","11010000100","11010010000","11010011100","1100011101011"];

function drawCode128(canvas, text){
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||canvas.width||360;
  const H=canvas.height||54;
  canvas.width=W; ctx.clearRect(0,0,W,H);
  try{
    const codes=[104];
    for(const ch of text){const c=ch.charCodeAt(0);if(c<32||c>126)throw 0;codes.push(c-32);}
    let cs=104; for(let i=1;i<codes.length;i++) cs+=codes[i]*i; cs%=103;
    codes.push(cs,106);
    const bits=codes.map(c=>C128[c]).join('');
    const mw=W/bits.length; let x=0; ctx.fillStyle='#111';
    for(let i=0;i<bits.length;i++){if(bits[i]==='1')ctx.fillRect(x,0,Math.ceil(mw),H-13);x+=mw;}
    ctx.fillStyle='#555';ctx.font='10px Sarabun';ctx.textAlign='center';
    ctx.fillText(text,W/2,H-2);
  }catch{
    ctx.fillStyle='#f0f0f0';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#aaa';ctx.font='11px Sarabun';ctx.textAlign='center';
    ctx.fillText('INVALID',W/2,H/2);
  }
}

// ══════════════════════════════════════════════
//  Load data & Setup Filters
// ══════════════════════════════════════════════
async function loadAll(){
  showLoading('กำลังโหลดรายการสินค้า…');
  try{
    // โหลดเฉพาะข้อมูลสินค้าก็พอ ไม่ต้องพึ่งชีท Settings แล้ว
    const prodRes = await gasCall('getAll'); 
    allItems = prodRes.data || [];

    // เตรียมตัวแปรเก็บตัวเลือกแบบไม่ซ้ำกัน
    const comps = new Set(), cats = new Set();
    const pkgs = new Set(), films = new Set(), caps = new Set(), boxes = new Set();
    
    // กวาดข้อมูลจากสินค้าทั้งหมดที่มีมาสร้างเป็น Dropdown
    allItems.forEach(item => {
        // ถ้ารายการโดนซ่อนอยู่ ไม่ต้องเอามาสร้างตัวเลือก
        if(item.status === 'hidden') return; 
        
        if(item.company) comps.add(item.company);
        if(item.category) cats.add(item.category);
        
        if(item.parts) {
            if(item.parts['บรรจุภัณฑ์']) pkgs.add(item.parts['บรรจุภัณฑ์']);
            if(item.parts['ฟิล์ม']) films.add(item.parts['ฟิล์ม']);
            if(item.parts['ฝา']) caps.add(item.parts['ฝา']);
            if(item.parts['ลังนอก']) boxes.add(item.parts['ลังนอก']);
        }
    });
    
    // นำค่าที่กวาดได้ไปยัดใส่ Dropdown
    fillSelect('fCompany', Array.from(comps).sort(), true);
    fillSelect('fCategory', Array.from(cats).sort(), true);
    fillSelect('fPackage', Array.from(pkgs).sort(), true);
    fillSelect('fFilm', Array.from(films).sort(), true);
    fillSelect('fCap', Array.from(caps).sort(), true);
    fillSelect('fBox', Array.from(boxes).sort(), true);

    render();
    toast('✅ โหลด '+allItems.length+' รายการ');
  } catch(e){
    toast('❌ โหลดไม่สำเร็จ: '+e.message, 5000);
  } finally {
    hideLoading();
  }
}

function fillSelect(id, arr, withAll=false){
  const el=document.getElementById(id); if(!el)return;
  el.innerHTML = withAll?'<option value="">ทั้งหมด</option>':'';
  arr.forEach(v=>el.innerHTML+=`<option value="${v}">${v}</option>`);
}

function toggleFilters() {
    const ext = document.getElementById('extendedFilters');
    if(ext.classList.contains('hidden')) {
        ext.classList.remove('hidden');
        document.getElementById('toggleFilterBtn').innerHTML = "🔼 ซ่อนตัวกรอง";
    } else {
        ext.classList.add('hidden');
        document.getElementById('toggleFilterBtn').innerHTML = "⚙️ ตัวกรองเพิ่มเติม";
    }
}

// ══════════════════════════════════════════════
//  Filter + Render
// ══════════════════════════════════════════════
function filtered(){
  const comp = document.getElementById('fCompany').value;
  const cat  = document.getElementById('fCategory').value;
  const pkg  = document.getElementById('fPackage').value;
  const film = document.getElementById('fFilm').value;
  const cap  = document.getElementById('fCap').value;
  const box  = document.getElementById('fBox').value;
  const q    = (document.getElementById('fSearch').value||'').trim().toLowerCase();
  
  let arr = allItems.filter(x=>x.mode===filterMod);
  
  // 🟢 ส่วนที่เพิ่มใหม่: กรองเอารายการที่ถูกตั้งสถานะว่า 'hidden' ออกไป ไม่ให้แสดงผล
  arr = arr.filter(x => x.status !== 'hidden');
  
  if(comp) arr=arr.filter(x=>x.company===comp||x.rawCompany===comp);
  if(cat)  arr=arr.filter(x=>x.category===cat);
  if(pkg)  arr=arr.filter(x=>x.parts && x.parts['บรรจุภัณฑ์'] === pkg);
  if(film) arr=arr.filter(x=>x.parts && x.parts['ฟิล์ม'] === film);
  if(cap)  arr=arr.filter(x=>x.parts && x.parts['ฝา'] === cap);
  if(box)  arr=arr.filter(x=>x.parts && x.parts['ลังนอก'] === box);
  
  if(q) arr=arr.filter(x=>(x.name||'').toLowerCase().includes(q) || String(x.barcode||'').includes(q));
  return arr;
}

function setMode(mode, btn){
  filterMod=mode; page=1;
  document.getElementById('fSingle').classList.toggle('active',mode==='single');
  document.getElementById('fSet').classList.toggle('active',mode==='set');
  render();
}

function render(){
  const arr  = filtered();
  const max  = Math.ceil(arr.length/PAGE_SIZE)||1;
  if(page>max) page=max;
  document.getElementById('pageNum').textContent=String(page);
  document.getElementById('listCount').textContent='(พบ '+arr.length+' รายการ)';
  const slice = arr.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  // Reset check all state
  document.getElementById('chkAllTable').checked = false;
  document.getElementById('chkAllCard').checked = false;

  if(viewMode==='card') renderCards(slice);
  else renderTable(slice);
  
  updateBulkPrintBar();
}

function renderTable(slice){
  document.getElementById('tableView').classList.remove('hidden');
  document.getElementById('cardView').classList.add('hidden');
  const body = document.getElementById('tableBody');
  body.innerHTML='';
  document.getElementById('tableEmpty').classList.toggle('hidden', slice.length>0);
  
  let allChecked = slice.length > 0;

  slice.forEach(item=>{
    const isChecked = selectedIds.has(item.id);
    if(!isChecked) allChecked = false;
    
    const safeUrl = getSafeImageUrl(item.photoUrl);
    const tr=document.createElement('tr');
    if(isChecked) tr.classList.add('selected');
    
    tr.innerHTML=`
      <td><input type="checkbox" class="chk-box item-chk" value="${item.id}" ${isChecked?'checked':''} onchange="toggleItem(this, '${item.id}')"></td>
      <td><div class="thumb">${safeUrl?`<img src="${safeUrl}" loading="lazy"/>`:`<span class="thumb-empty">ไม่มีรูป</span>`}</div></td>
      <td style="text-align:left"><b>${item.name||''}</b></td>
      <td>${item.size||'—'}</td>
      <td style="font-size:.85rem">${item.company||''}</td>
      <td><div class="actions">
        <div class="iconbtn" title="พรีวิว" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>👁️</div>
        <div class="iconbtn" title="พิมพ์" onclick='printItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>🖨️</div>
      </div></td>`;
    body.appendChild(tr);
  });
  
  if(slice.length > 0) document.getElementById('chkAllTable').checked = allChecked;
}

function renderCards(slice){
  document.getElementById('tableView').classList.add('hidden');
  document.getElementById('cardView').classList.remove('hidden');
  const grid=document.getElementById('cardGrid');
  grid.innerHTML='';
  document.getElementById('cardEmpty').classList.toggle('hidden', slice.length>0);
  
  let allChecked = slice.length > 0;

  slice.forEach(item=>{
    const isChecked = selectedIds.has(item.id);
    if(!isChecked) allChecked = false;
    
    const safeUrl = getSafeImageUrl(item.photoUrl);
    const div=document.createElement('div');
    div.className = `product-card ${isChecked ? 'selected' : ''}`;
    div.innerHTML=`
      <div class="card-chk-wrap">
         <input type="checkbox" class="chk-box item-chk" value="${item.id}" ${isChecked?'checked':''} onchange="toggleItem(this, '${item.id}')">
      </div>
      ${safeUrl
        ? `<img class="card-img" src="${safeUrl}" loading="lazy"/>`
        : `<div class="card-img-empty">📷 ไม่มีรูป</div>`}
      <div class="card-body">
        <div class="card-name">${item.name||'—'}</div>
        <div class="card-size">${item.size||''}</div>
        <div class="card-company">${item.company||''}</div>
      </div>
      <div class="card-footer">
        <div class="iconbtn" title="พรีวิว" style="flex:1" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>👁️</div>
        <div class="iconbtn" title="พิมพ์" style="flex:1" onclick='printItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>🖨️</div>
      </div>`;
    grid.appendChild(div);
  });
  
  if(slice.length > 0) document.getElementById('chkAllCard').checked = allChecked;
}

// ══════════════════════════════════════════════
//  Checkbox Logic
// ══════════════════════════════════════════════
function toggleItem(checkbox, id) {
    if(checkbox.checked) selectedIds.add(id);
    else selectedIds.delete(id);
    
    // Update visual highlighting for rows/cards
    const parent = checkbox.closest('tr') || checkbox.closest('.product-card');
    if(parent) {
        if(checkbox.checked) parent.classList.add('selected');
        else parent.classList.remove('selected');
    }
    
    updateBulkPrintBar();
}

function toggleAllPage(isChecked) {
    const checkboxes = document.querySelectorAll('.item-chk');
    checkboxes.forEach(chk => {
        chk.checked = isChecked;
        if(isChecked) selectedIds.add(chk.value);
        else selectedIds.delete(chk.value);
        
        const parent = chk.closest('tr') || chk.closest('.product-card');
        if(parent) {
            if(isChecked) parent.classList.add('selected');
            else parent.classList.remove('selected');
        }
    });
    
    // Sync table and card main checkboxes
    document.getElementById('chkAllTable').checked = isChecked;
    document.getElementById('chkAllCard').checked = isChecked;
    
    updateBulkPrintBar();
}

function clearSelection() {
    selectedIds.clear();
    render();
}

function updateBulkPrintBar() {
    const bar = document.getElementById('bulkPrintBar');
    const countSpan = document.getElementById('selCount');
    countSpan.textContent = selectedIds.size;
    
    if(selectedIds.size > 0) bar.classList.remove('hidden');
    else bar.classList.add('hidden');
}

// ══════════════════════════════════════════════
//  Preview Modal
// ══════════════════════════════════════════════
let currentModalItem = null;
function openModal(item){
  currentModalItem = item;
  document.getElementById('modalTitle').textContent = item.name||'พรีวิวสินค้า';
  document.getElementById('mName').textContent     = item.name    ||'—';
  document.getElementById('mSize').textContent     = item.size    ||'—';
  document.getElementById('mCompany').textContent  = item.company ||'—';
  document.getElementById('mCategory').textContent = item.category||'—';

  const safeUrl = getSafeImageUrl(item.photoUrl);
  const photoWrap=document.getElementById('modalPhotoWrap');
  photoWrap.innerHTML='';
  if(safeUrl){
    const img=document.createElement('img');
    img.className='modal-photo'; img.src=safeUrl;
    photoWrap.appendChild(img);
  } else {
    photoWrap.innerHTML='<div class="modal-photo-empty">📷 ไม่มีรูปสินค้า</div>';
  }

  // Parts table
  const partsWrap=document.getElementById('mPartsWrap');
  const rows=Object.entries(item.parts||{}).filter(([,v])=>v&&String(v).trim());
  if(rows.length){
    partsWrap.innerHTML=`
      <div class="modal-section-title">ส่วนประกอบ / รายละเอียด</div>
      <table class="parts-table">
        <thead><tr><th>หัวข้อ</th><th>รายละเอียด</th></tr></thead>
        <tbody>${rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</tbody>
      </table>`;
  } else {
    partsWrap.innerHTML='<div style="font-size:.85rem;color:#bbb">ไม่มีรายละเอียดส่วนประกอบ</div>';
  }

  // Barcode
  const barcodeStr=String(item.barcode||'').padStart(9,'0');
  const bc=document.getElementById('mBarcodeCanvas');
  setTimeout(()=>drawCode128(bc,barcodeStr),50);
  document.getElementById('mBarcodeNum').textContent=barcodeStr;

  document.querySelector('.modal-scroll').scrollTop=0;
  document.getElementById('previewModal').classList.add('open');
}

function closeModal(){
  document.getElementById('previewModal').classList.remove('open');
}

document.getElementById('modalPrintBtn').onclick=()=>{ 
    closeModal(); 
    if(currentModalItem) printItem(currentModalItem); 
};

// ══════════════════════════════════════════════
//  Print Logic (Single & Bulk)
// ══════════════════════════════════════════════
function buildPrintNode(item) {
  const tpl=document.getElementById('printTpl');
  const node=tpl.content.cloneNode(true);
  node.querySelector('[data-f="company"]').textContent  = item.company  ||'';
  node.querySelector('[data-f="category"]').textContent = item.category ||'';
  node.querySelector('[data-f="name"]').textContent     = item.name     ||'';
  node.querySelector('[data-f="size"]').textContent     = item.size     ||'';
  node.querySelector('[data-f="printed"]').textContent  = new Date().toLocaleString('th-TH');

  const img=node.querySelector('[data-f="photo"]');
  const safeUrl = getSafeImageUrl(item.photoUrl);
  if(safeUrl) img.src=safeUrl; else img.remove();

  const table=node.querySelector('[data-f="table"]');
  const rows=Object.entries(item.parts||{}).filter(([,v])=>v&&String(v).trim());
  table.innerHTML='<thead><tr><th>หัวข้อ</th><th>รายละเอียด</th></tr></thead><tbody>'+
    rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')+'</tbody>';

  const bc=document.createElement('canvas'); bc.width=360; bc.height=80;
  drawCode128(bc, String(item.barcode||'').padStart(9,'0'));
  node.querySelector('[data-f="barcode"]').src=bc.toDataURL('image/png');
  
  return node;
}

function execPrint(containerHTML) {
  const w=window.open('','_blank');
  if(!w){alert('โปรดอนุญาตป๊อปอัปก่อน');return;}
  w.document.write(`<html><head><title>พิมพ์รายการสินค้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>${document.querySelector('style').innerHTML}</style>
    </head><body>${containerHTML}</body></html>`);
  w.document.close(); w.focus();
  setTimeout(()=>{w.print();w.close();}, 1500); // Wait for images
}

function printItem(item){
  const container=document.createElement('div');
  container.appendChild(buildPrintNode(item));
  execPrint(container.innerHTML);
}

function printSelectedItems() {
  if(selectedIds.size === 0) return;
  const itemsToPrint = allItems.filter(x => selectedIds.has(x.id));
  const container=document.createElement('div');
  itemsToPrint.forEach(item => {
      container.appendChild(buildPrintNode(item));
  });
  execPrint(container.innerHTML);
}
